<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta Engine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier New', monospace;
    background: #0d1117;
    color: #c9d1d9;
    padding: 20px;
    font-size: 13px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #30363d;
    padding-bottom: 12px;
    margin-bottom: 20px;
  }
  .header h1 { color: #58a6ff; font-size: 16px; letter-spacing: 1px; }
  .updated   { color: #8b949e; font-size: 11px; }
  .mode-live  { color: #3fb950; font-size: 11px; font-weight: bold; }
  .mode-dry   { color: #d29922; font-size: 11px; font-weight: bold; }
  .mode-paper { color: #d29922; font-size: 12px; font-weight: bold;
                background: #2d2200; border: 1px solid #d29922;
                border-radius: 4px; padding: 2px 8px; }

  /* ── Portfolio summary ── */
  .summary {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat .label { color: #8b949e; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 15px; color: #e6edf3; }
  .stat .value.pos { color: #3fb950; }
  .stat .value.neg { color: #f85149; }

  /* ── Strategy sections ── */
  .strategy-block { margin-bottom: 20px; }
  .strategy-title {
    color: #58a6ff;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 0 4px 0;
    border-bottom: 1px solid #21262d;
    margin-bottom: 4px;
  }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; }
  th {
    color: #8b949e;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: right;
    padding: 4px 10px;
    font-weight: normal;
    border-bottom: 1px solid #21262d;
  }
  th:first-child { text-align: left; }
  td {
    padding: 5px 10px;
    text-align: right;
    border-bottom: 1px solid #161b22;
    font-size: 12px;
  }
  td:first-child { text-align: left; color: #e6edf3; }

  tr:hover td { background: #161b22; }

  /* flat rows */
  tr.flat td { color: #484f58; }

  /* direction badges */
  .dir-long  { color: #3fb950; font-weight: bold; }
  .dir-short { color: #f85149; font-weight: bold; }
  .dir-flat  { color: #484f58; }

  /* PnL colouring */
  .pnl-pos { color: #3fb950; }
  .pnl-neg { color: #f85149; }
  .pnl-nil { color: #484f58; }

  /* ── Cycle log ── */
  .log-block {
    margin-top: 20px;
    padding: 10px 14px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    max-height: 140px;
    overflow-y: auto;
  }
  .log-title { color: #8b949e; font-size: 10px; text-transform: uppercase; margin-bottom: 6px; }
  .log-entry { color: #8b949e; font-size: 11px; padding: 1px 0; }
  .log-entry.action { color: #58a6ff; }

  /* ── Status bar ── */
  .statusbar {
    margin-top: 14px;
    color: #484f58;
    font-size: 10px;
    display: flex;
    justify-content: space-between;
  }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
         background: #3fb950; margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .error-banner {
    background: #2d1010; border: 1px solid #f85149; border-radius: 6px;
    padding: 10px 14px; color: #f85149; margin-bottom: 16px; font-size: 12px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ DELTA EXECUTION ENGINE</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="mode-badge"></span>
    <span class="updated" id="updated">—</span>
    &nbsp;&nbsp;
    <span id="cycle-badge" class="updated"></span>
  </div>
</div>

<div id="error-banner" class="error-banner" style="display:none"></div>

<div class="summary" id="summary">
  <div class="stat"><span class="label">Capital</span><span class="value" id="s-capital">—</span></div>
  <div class="stat"><span class="label">Open Slots</span><span class="value" id="s-open">—</span></div>
  <div class="stat"><span class="label">Allocated</span><span class="value" id="s-alloc">—</span></div>
  <div class="stat"><span class="label">Avg PnL</span><span class="value" id="s-pnl">—</span></div>
</div>

<div id="tables"></div>

<div class="log-block">
  <div class="log-title">Cycle Log</div>
  <div id="log-entries"></div>
</div>

<div class="statusbar">
  <span><span class="dot"></span>Live — refreshes every 30s</span>
  <span id="next-refresh">—</span>
</div>

<script>
const REFRESH_MS = 30_000;
let refreshTimer = REFRESH_MS;
let countdown;

function fmt(n, decimals=2) {
  if (n == null) return '—';
  return Number(n).toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
}

function fmtPrice(sym, price) {
  if (price == null) return '—';
  // BTC/ETH → 2dp, others → 4dp
  const dp = ['BTCUSD','ETHUSD'].some(s => sym.includes(s)) ? 2 : 4;
  return Number(price).toLocaleString(undefined, {minimumFractionDigits: dp, maximumFractionDigits: dp});
}

function pnlClass(v) {
  if (v == null) return 'pnl-nil';
  return v >= 0 ? 'pnl-pos' : 'pnl-neg';
}

function dirHtml(dir) {
  if (dir === 'long')  return '<span class="dir-long">LONG ↑</span>';
  if (dir === 'short') return '<span class="dir-short">SHORT ↓</span>';
  return '<span class="dir-flat">flat</span>';
}

function render(data) {
  // Header
  const ts = new Date(data.updated_at);
  document.getElementById('updated').textContent = 'Updated ' + ts.toLocaleTimeString();
  document.getElementById('cycle-badge').textContent = 'Cycle #' + data.cycle;

  // Mode badge
  const modeBadgeEl = document.getElementById('mode-badge');
  if (data.mode === 'paper') {
    modeBadgeEl.textContent = '📄 PAPER TRADE';
    modeBadgeEl.className = 'mode-paper';
  } else {
    modeBadgeEl.textContent = '';
    modeBadgeEl.className = '';
  }

  // Summary
  const p = data.portfolio;
  document.getElementById('s-capital').textContent = '$' + fmt(p.total_capital, 0);
  document.getElementById('s-open').textContent    = p.open_slots + ' / ' + p.n_slots;
  document.getElementById('s-alloc').textContent   = '$' + fmt(p.allocated_usd, 0);
  const pnlEl = document.getElementById('s-pnl');
  const pnl   = p.avg_pnl_pct;
  pnlEl.textContent  = pnl != null ? (pnl >= 0 ? '+' : '') + fmt(pnl) + '%' : '—';
  pnlEl.className    = 'value ' + pnlClass(pnl);

  // Group slots by strategy
  const strategies = {};
  for (const slot of data.slots) {
    if (!strategies[slot.strategy]) strategies[slot.strategy] = [];
    strategies[slot.strategy].push(slot);
  }

  let html = '';
  for (const [strat, slots] of Object.entries(strategies)) {
    // Strategy config label
    const tfMap = {'MACD_LS':'12h L+S','EMABand':'4h LO','Donchian':'4h LO','EWMAC':'4h LO'};
    const tfLabel = tfMap[strat] || '';
    html += `<div class="strategy-block">
      <div class="strategy-title">${strat} &nbsp;·&nbsp; ${tfLabel}</div>
      <table>
        <thead><tr>
          <th>Symbol</th>
          <th>Direction</th>
          <th>Entry</th>
          <th>Current</th>
          <th>PnL%</th>
          <th>Alloc $</th>
        </tr></thead>
        <tbody>`;

    for (const s of slots) {
      const isFlat = s.direction === 'flat';
      const rowCls = isFlat ? 'flat' : '';
      const pnlStr = s.pnl_pct != null
        ? (s.pnl_pct >= 0 ? '+' : '') + fmt(s.pnl_pct) + '%'
        : '—';
      html += `<tr class="${rowCls}">
        <td>${s.symbol}</td>
        <td>${dirHtml(s.direction)}</td>
        <td>${isFlat ? '—' : fmtPrice(s.symbol, s.entry_price)}</td>
        <td>${fmtPrice(s.symbol, s.current_price)}</td>
        <td class="${pnlClass(s.pnl_pct)}">${pnlStr}</td>
        <td>${isFlat ? '—' : '$' + fmt(s.allocation_usd, 0)}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }
  document.getElementById('tables').innerHTML = html;

  // Cycle log
  const logEl = document.getElementById('log-entries');
  if (data.cycle_log && data.cycle_log.length) {
    logEl.innerHTML = data.cycle_log
      .slice().reverse()
      .map(e => `<div class="log-entry action">${e}</div>`)
      .join('');
  } else {
    logEl.innerHTML = '<div class="log-entry">No actions this cycle</div>';
  }

  document.getElementById('error-banner').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}

async function refresh() {
  try {
    const resp = await fetch('positions.json?_=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    render(data);
  } catch (e) {
    showError('Could not load positions.json — ' + e.message +
              '. Make sure python -m http.server 8080 is running in live/web/');
  }
}

// Countdown display
function startCountdown() {
  clearInterval(countdown);
  refreshTimer = REFRESH_MS;
  countdown = setInterval(() => {
    refreshTimer -= 1000;
    const secs = Math.max(0, Math.round(refreshTimer / 1000));
    document.getElementById('next-refresh').textContent = 'Next refresh in ' + secs + 's';
    if (refreshTimer <= 0) {
      clearInterval(countdown);
      refresh().then(startCountdown);
    }
  }, 1000);
}

refresh().then(startCountdown);
</script>
</body>
</html>
